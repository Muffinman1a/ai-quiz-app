<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Knowledge Quiz</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <style>
    .answer-btn { transition: all 0.15s ease; }
    .answer-btn:active { transform: scale(0.97); }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="h-full bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">

<div id="app" class="min-h-full flex items-center justify-center p-4">
  <div class="w-full max-w-md">

    <!-- Card -->
    <div id="card" class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-6 fade-in">
      <!-- Content injected by JS -->
    </div>

  </div>
</div>

<script>
  // ─── Quiz data ────────────────────────────────────────────────────────────
  const questions = [
    {
      question: "What does LLM stand for in the context of AI?",
      options: [
        "Large Language Model",
        "Logical Learning Machine",
        "Linear Logic Module",
        "Layered Language Matrix"
      ],
      correct: 0
    },
    {
      question: "Which company created ChatGPT?",
      options: [
        "Google",
        "Meta",
        "OpenAI",
        "Microsoft"
      ],
      correct: 2
    },
    {
      question: "What is a 'prompt' in the context of AI?",
      options: [
        "A reminder notification from the app",
        "A type of neural network layer",
        "An instruction or input given to an AI model",
        "A programming language for AI systems"
      ],
      correct: 2
    }
  ];

  // ─── State ────────────────────────────────────────────────────────────────
  let current = 0;
  let score = 0;
  let answered = false;

  // ─── Render ───────────────────────────────────────────────────────────────
  function renderQuestion() {
    answered = false;
    const q = questions[current];
    const card = document.getElementById('card');

    card.innerHTML = `
      <div class="fade-in">
        <!-- Question -->
        <h2 class="text-lg font-semibold mb-5 leading-snug">${q.question}</h2>

        <!-- Options -->
        <div class="space-y-3" id="options">
          ${q.options.map((opt, i) => `
            <button
              class="answer-btn w-full text-left px-4 py-3 rounded-xl border-2 border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 hover:border-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 font-medium text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
              onclick="selectAnswer(${i})"
              data-index="${i}"
              aria-label="Option ${i + 1}: ${opt}"
            >
              <span class="inline-block w-6 h-6 rounded-full bg-gray-100 dark:bg-gray-600 text-xs font-bold text-center leading-6 mr-2">${'ABCD'[i]}</span>
              ${opt}
            </button>
          `).join('')}
        </div>
      </div>
    `;
  }

  function selectAnswer(index) {
    if (answered) return;
    answered = true;

    const q = questions[current];
    const isCorrect = index === q.correct;
    if (isCorrect) score++;

    // Disable buttons after answering
    const buttons = document.querySelectorAll('.answer-btn');
    buttons.forEach(btn => { btn.disabled = true; });

    // Add next button
    const optionsDiv = document.getElementById('options');
    const nextBtn = document.createElement('button');
    const isLast = current === questions.length - 1;
    nextBtn.textContent = isLast ? 'See my results →' : 'Next question →';
    nextBtn.className = 'mt-4 w-full py-3 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-semibold text-sm transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-400';
    nextBtn.onclick = () => {
      current++;
      if (current < questions.length) {
        renderQuestion();
      } else {
        renderResults();
      }
    };
    optionsDiv.appendChild(nextBtn);
  }

  function renderResults() {
    const perfect = score === questions.length;
    const card = document.getElementById('card');

    card.innerHTML = `
      <div class="fade-in text-center">
        <!-- Score -->
        <div class="mb-6">
          <div class="text-6xl mb-2">${perfect ? '🏆' : score >= 2 ? '🎯' : '📚'}</div>
          <h2 class="text-2xl font-bold mb-1">You scored ${score} out of ${questions.length}</h2>
          <p class="text-gray-500 dark:text-gray-400 text-sm">
            ${perfect ? 'Perfect score! You really know your AI.' : score >= 2 ? 'Great job — almost there!' : 'Keep learning — AI is worth understanding!'}
          </p>
        </div>

        <!-- Feedback prompt -->
        <div class="bg-indigo-50 dark:bg-indigo-900/30 rounded-xl p-4 mb-5 text-left">
          <p class="text-sm font-semibold text-indigo-700 dark:text-indigo-300 mb-1">💬 Share your feedback</p>
          <p class="text-xs text-indigo-600 dark:text-indigo-400">
            What would you improve about this quiz? Send one suggestion in <strong>Teams chat</strong> — it will be used live in today's demo!
          </p>
        </div>

        <!-- Restart -->
        <button
          onclick="restartQuiz()"
          class="w-full py-3 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-semibold text-sm transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-400"
        >
          Play again
        </button>
      </div>
    `;

    if (perfect) {
      confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
    }
  }

  function restartQuiz() {
    current = 0;
    score = 0;
    answered = false;
    renderQuestion();
  }

  // ─── Init ─────────────────────────────────────────────────────────────────
  renderQuestion();
</script>

</body>
</html>
