<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Knowledge Quiz</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
  <style>
    .answer-btn { transition: all 0.15s ease; }
    .answer-btn:active { transform: scale(0.97); }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="h-full bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">

<div id="app" class="min-h-full flex items-center justify-center p-4">
  <div class="w-full max-w-md">

    <!-- Dark mode toggle -->
    <div class="flex justify-end mb-4">
      <button
        id="theme-toggle"
        onclick="toggleDark()"
        class="text-sm px-3 py-1 rounded-full border border-gray-300 dark:border-gray-600 text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800"
        aria-label="Toggle dark mode"
      >
        <span id="theme-label">🌙 Dark</span>
      </button>
    </div>

    <!-- Card -->
    <div id="card" class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-6 fade-in">
      <!-- Content injected by JS -->
    </div>

  </div>
</div>

<script>
  // ─── Quiz data ────────────────────────────────────────────────────────────
  const questions = [
    {
      question: "What does LLM stand for in the context of AI?",
      options: [
        "Large Language Model",
        "Logical Learning Machine",
        "Linear Logic Module",
        "Layered Language Matrix"
      ],
      correct: 0
    },
    {
      question: "Which company created ChatGPT?",
      options: [
        "Google",
        "Meta",
        "OpenAI",
        "Microsoft"
      ],
      correct: 2
    },
    {
      question: "What is a 'prompt' in the context of AI?",
      options: [
        "A reminder notification from the app",
        "A type of neural network layer",
        "An instruction or input given to an AI model",
        "A programming language for AI systems"
      ],
      correct: 2
    }
  ];

  // ─── State ────────────────────────────────────────────────────────────────
  let current = 0;
  let score = 0;
  let answered = false;
  let results = []; // { question, chosen, correct }

  // ─── Dark mode ────────────────────────────────────────────────────────────
  function toggleDark() {
    document.documentElement.classList.toggle('dark');
    const isDark = document.documentElement.classList.contains('dark');
    document.getElementById('theme-label').textContent = isDark ? '☀️ Light' : '🌙 Dark';
  }

  // ─── Render ───────────────────────────────────────────────────────────────
  function renderQuestion() {
    answered = false;
    const q = questions[current];
    const card = document.getElementById('card');

    card.innerHTML = `
      <div class="fade-in">
        <!-- Progress -->
        <div class="mb-5">
          <div class="flex justify-between text-xs text-gray-400 dark:text-gray-500 mb-1">
            <span>Question ${current + 1} of ${questions.length}</span>
            <span>${Math.round(((current) / questions.length) * 100)}% complete</span>
          </div>
          <div class="w-full bg-gray-100 dark:bg-gray-700 rounded-full h-2">
            <div
              class="bg-indigo-500 h-2 rounded-full transition-all duration-500"
              style="width: ${(current / questions.length) * 100}%"
            ></div>
          </div>
        </div>

        <!-- Question -->
        <h2 class="text-lg font-semibold mb-5 leading-snug">${q.question}</h2>

        <!-- Options -->
        <div class="space-y-3" id="options">
          ${q.options.map((opt, i) => `
            <button
              class="answer-btn w-full text-left px-4 py-3 rounded-xl border-2 border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 hover:border-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 font-medium text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
              onclick="selectAnswer(${i})"
              data-index="${i}"
              aria-label="Option ${i + 1}: ${opt}"
            >
              <span class="inline-block w-6 h-6 rounded-full bg-gray-100 dark:bg-gray-600 text-xs font-bold text-center leading-6 mr-2">${'ABCD'[i]}</span>
              ${opt}
            </button>
          `).join('')}
        </div>
      </div>
    `;
  }

  function selectAnswer(index) {
    if (answered) return;
    answered = true;

    const q = questions[current];
    const isCorrect = index === q.correct;
    if (isCorrect) score++;

    results.push({ question: q.question, chosen: index, correct: q.correct, options: q.options });

    // Style buttons
    const buttons = document.querySelectorAll('.answer-btn');
    buttons.forEach((btn, i) => {
      btn.disabled = true;
      if (i === q.correct) {
        btn.className = btn.className.replace('border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 hover:border-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-900/30', 'border-green-400 bg-green-50 dark:bg-green-900/30 text-green-700 dark:text-green-300');
      } else if (i === index && !isCorrect) {
        btn.className = btn.className.replace('border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 hover:border-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-900/30', 'border-red-400 bg-red-50 dark:bg-red-900/30 text-red-700 dark:text-red-300');
      }
    });

    // Add next button
    const optionsDiv = document.getElementById('options');
    const nextBtn = document.createElement('button');
    const isLast = current === questions.length - 1;
    nextBtn.textContent = isLast ? 'See my results →' : 'Next question →';
    nextBtn.className = 'mt-4 w-full py-3 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-semibold text-sm transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-400';
    nextBtn.onclick = () => {
      current++;
      if (current < questions.length) {
        renderQuestion();
      } else {
        renderResults();
      }
    };
    optionsDiv.appendChild(nextBtn);
  }

  function renderResults() {
    const perfect = score === questions.length;
    const card = document.getElementById('card');

    card.innerHTML = `
      <div class="fade-in text-center">
        <!-- Score -->
        <div class="mb-6">
          <div class="text-6xl mb-2">${perfect ? '🏆' : score >= 2 ? '🎯' : '📚'}</div>
          <h2 class="text-2xl font-bold mb-1">You scored ${score} out of ${questions.length}</h2>
          <p class="text-gray-500 dark:text-gray-400 text-sm">
            ${perfect ? 'Perfect score! You really know your AI.' : score >= 2 ? 'Great job — almost there!' : 'Keep learning — AI is worth understanding!'}
          </p>
        </div>

        <!-- Answer summary -->
        <div class="text-left space-y-3 mb-6">
          ${results.map((r, i) => `
            <div class="rounded-xl p-3 ${r.chosen === r.correct ? 'bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800' : 'bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800'}">
              <p class="text-xs font-semibold ${r.chosen === r.correct ? 'text-green-600 dark:text-green-400' : 'text-red-600 dark:text-red-400'} mb-1">
                ${r.chosen === r.correct ? '✓ Correct' : '✗ Incorrect'}
              </p>
              <p class="text-xs text-gray-600 dark:text-gray-400 mb-1">${r.question}</p>
              ${r.chosen !== r.correct ? `<p class="text-xs text-gray-500 dark:text-gray-500">Correct answer: <strong>${r.options[r.correct]}</strong></p>` : ''}
            </div>
          `).join('')}
        </div>

        <!-- Feedback prompt -->
        <div class="bg-indigo-50 dark:bg-indigo-900/30 rounded-xl p-4 mb-5 text-left">
          <p class="text-sm font-semibold text-indigo-700 dark:text-indigo-300 mb-1">💬 Share your feedback</p>
          <p class="text-xs text-indigo-600 dark:text-indigo-400">
            What would you improve about this quiz? Send one suggestion in <strong>Teams chat</strong> — it will be used live in today's demo!
          </p>
        </div>

        <!-- Restart -->
        <button
          onclick="restartQuiz()"
          class="w-full py-3 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-semibold text-sm transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-400"
        >
          Play again
        </button>
      </div>
    `;

    if (perfect) {
      confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
    }
  }

  function restartQuiz() {
    current = 0;
    score = 0;
    answered = false;
    results = [];
    renderQuestion();
  }

  // ─── Keyboard navigation ──────────────────────────────────────────────────
  document.addEventListener('keydown', (e) => {
    if (['1','2','3','4'].includes(e.key) && !answered) {
      selectAnswer(parseInt(e.key) - 1);
    }
  });

  // ─── Init ─────────────────────────────────────────────────────────────────
  renderQuestion();
</script>

</body>
</html>
